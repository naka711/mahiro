<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CYBER RUNNER - NEO TOKYO</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', monospace; }
        canvas { display: block; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; pointer-events: none; }
        .glitch { text-shadow: 2px 0 #f0f, -2px 0 #0ff; }
    </style>
</head>
<body>
    <div id="ui">DATA_CORE: <span id="coinCount">0</span> / 5 <br> <span id="msg" class="glitch"></span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const coinEl = document.getElementById('coinCount');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = 450;

const worldWidth = 3000; 
let cameraX = 0;
let coins = 0;
let gameActive = true;
const gravity = 0.65;

const player = {
    x: 100, y: 300, w: 30, h: 45,
    vx: 0, vy: 0, speed: 6, jumpPower: -15, grounded: false,
    trail: [] // 残像用
};

const grounds = [{x: 0, w: 800}, {x: 1000, w: 600}, {x: 1800, w: 1200}];

let pickups = [
    {x: 400, y: 250}, {x: 750, y: 150}, {x: 1100, y: 280}, 
    {x: 1400, y: 120}, {x: 1900, y: 250}, {x: 2200, y: 150},
    {x: 2500, y: 280}, {x: 2700, y: 120}
].map(p => ({...p, w: 20, h: 20}));

let platforms = [
    {x: 820, y: 250, w: 150, h: 10, type: 'moving', offset: 0},
    {x: 1620, y: 220, w: 150, h: 10, type: 'static'}
];

let enemies = [
    {x: 500, y: 315, w: 30, h: 30, speed: 3, dir: 1, type: 'land'},
    {x: 1200, y: 150, w: 35, h: 20, speed: 4, dir: 1, type: 'air'},
    {x: 2100, y: 315, w: 30, h: 30, speed: 5, dir: 1, type: 'land'}
];

let goal = { x: 2850, y: 150, w: 20, h: 200 };

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (!gameActive) return;

    if (keys['ArrowRight']) player.vx = player.speed;
    else if (keys['ArrowLeft']) player.vx = -player.speed;
    else player.vx *= 0.85;

    if ((keys['Space'] || keys['ArrowUp']) && player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // 残像の記録
    player.trail.unshift({x: player.x, y: player.y});
    if (player.trail.length > 5) player.trail.pop();

    let onAnyGround = false;
    grounds.forEach(g => {
        if (player.x + player.w > g.x && player.x < g.x + g.w &&
            player.y + player.h >= 350 && player.y + player.h <= 375) {
            player.y = 350 - player.h;
            player.vy = 0;
            onAnyGround = true;
        }
    });

    platforms.forEach(p => {
        let px = p.x + (p.offset || 0);
        if (p.type === 'moving') p.offset = Math.sin(Date.now() / 800) * 120;
        if (player.vy > 0 && player.x + player.w > px && player.x < px + p.w &&
            player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15) {
            player.y = p.y - player.h;
            player.vy = 0;
            onAnyGround = true;
        }
    });
    player.grounded = onAnyGround;

    if (player.y > canvas.height) gameOver("SYSTEM_FAILURE: SIGNAL LOST");

    cameraX = player.x - canvas.width / 3;
    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width));

    pickups.forEach((c, i) => {
        if (rectIntersect(player, c)) {
            pickups.splice(i, 1);
            coins++;
        }
    });

    enemies.forEach(e => {
        if (e.type === 'land') {
            e.x += e.speed * e.dir;
            if (e.x > worldWidth || e.x < 0) e.dir *= -1;
        } else {
            e.y += Math.sin(Date.now() / 300) * 3;
            e.x -= 2;
            if (e.x < -100) e.x = worldWidth;
        }
        if (rectIntersect(player, e)) {
            if (player.vy > 0 && player.y < e.y) {
                e.x = -5000;
                player.vy = -12;
            } else {
                gameOver("CONNECTION_INTERRUPTED: DEAD");
            }
        }
    });

    if (rectIntersect(player, goal)) {
        if (coins >= 5) {
            gameActive = false;
            alert("ACCESS GRANTED: SECTOR CLEAR");
            location.reload();
        } else {
            msgEl.innerText = ">> ACCESS_DENIED: NEED_DATA_CORE";
        }
    } else {
        msgEl.innerText = "";
    }
    coinEl.innerText = coins;
}

function rectIntersect(a, b) {
    let bx = b.x + (b.offset || 0);
    return a.x < bx + b.w && a.x + a.w > bx && a.y < b.y + b.h && a.y + a.h > b.y;
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 背景のビル群
    ctx.fillStyle = "#111";
    for(let i=0; i<10; i++) {
        ctx.fillRect(i*400, 100 + (i%3)*50, 150, 300);
        ctx.strokeStyle = "#222";
        ctx.strokeRect(i*400, 100 + (i%3)*50, 150, 300);
    }

    // 地面（グリッド線入り）
    grounds.forEach(g => {
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(g.x, 350, g.w, 100);
        ctx.strokeStyle = "#0ff";
        ctx.lineWidth = 2;
        ctx.strokeRect(g.x, 350, g.w, 2);
    });

    // 足場（ネオンバー）
    platforms.forEach(p => {
        let px = p.x + (p.offset || 0);
        ctx.fillStyle = "#000";
        ctx.fillRect(px, p.y, p.w, p.h);
        ctx.strokeStyle = p.type === 'moving' ? "#f0f" : "#0ff";
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.strokeRect(px, p.y, p.w, p.h);
        ctx.shadowBlur = 0;
    });

    // コイン (データコア)
    pickups.forEach(c => {
        ctx.fillStyle = "#0ff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.fillRect(c.x+5, c.y+5, 10, 10);
        ctx.shadowBlur = 0;
    });

    // 敵 (ドローン)
    enemies.forEach(e => {
        ctx.fillStyle = "#f00";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#f00";
        ctx.beginPath();
        ctx.moveTo(e.x, e.y + e.h);
        ctx.lineTo(e.x + e.w/2, e.y);
        ctx.lineTo(e.x + e.w, e.y + e.h);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    // ゴール (ポータル)
    ctx.strokeStyle = coins >= 5 ? "#0ff" : "#333";
    ctx.lineWidth = 4;
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);
    ctx.setLineDash([]);

    // プレイヤー（残像）
    player.trail.forEach((pos, i) => {
        ctx.fillStyle = `rgba(0, 255, 255, ${0.4 - i*0.1})`;
        ctx.fillRect(pos.x, pos.y, player.w, player.h);
    });
    // プレイヤー（本体）
    ctx.fillStyle = "#fff";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#0ff";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(player.x + 10, player.y + 10, 15, 5); // バイザー
    ctx.shadowBlur = 0;

    ctx.restore();

    if (gameActive) {
        update();
        requestAnimationFrame(draw);
    }
}

function gameOver(t) {
    gameActive = false;
    ctx.fillStyle = "red";
    ctx.font = "bold 40px Courier New";
    ctx.fillText(t, canvas.width/4, canvas.height/2);
    setTimeout(() => location.reload(), 2000);
}

draw();
</script>
</body>
</html>
