<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fox Brick Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #FFF; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #msg { color: #ff0; font-size: 18px; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>NUTS: <span id="coinCount">0</span> / 10</div>
        <div id="msg">!!! NEED MORE NUTS !!!</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const coinEl = document.getElementById('coinCount');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = 480;

const worldWidth = 5500;
const blockSize = 40;
let cameraX = 0;
let coins = 0;
let gameActive = true;
const gravity = 0.8;

const player = {
    x: 80, y: 200, w: 32, h: 32,
    vx: 0, vy: 0, speed: 5, jumpPower: -16, grounded: false
};

// ブロック配置 (1=レンガ, 2=ハテナ)
let mapBlocks = [];
function addPlatform(startX, y, width, type=1) {
    for(let i=0; i<width; i++) {
        mapBlocks.push({x: startX + i*blockSize, y: y, type: type, hit: false});
    }
}

// ステージ構成
addPlatform(0, 400, 25);     // 最初の地面
addPlatform(400, 280, 3, 2); // ハテナブロック
addPlatform(1200, 400, 15);  // 第2地面
addPlatform(1400, 240, 5, 1);
addPlatform(2800, 400, 20);  // 第3地面
addPlatform(3000, 250, 2, 2);

let pickups = []; // ハテナから出る用
let enemies = [
    {x: 600, y: 368, w: 32, h: 32, speed: 2, dir: 1, type: 'land'},
    {x: 1500, y: 368, w: 32, h: 32, speed: 3, dir: 1, type: 'land'},
    {x: 3200, y: 368, w: 32, h: 32, speed: 4, dir: 1, type: 'land'}
];

const goal = { x: 5300, y: 240, w: 10, h: 160 };

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (!gameActive) return;

    // 移動
    if (keys['ArrowRight']) player.vx = player.speed;
    else if (keys['ArrowLeft']) player.vx = -player.speed;
    else player.vx *= 0.8;

    if ((keys['Space'] || keys['ArrowUp']) && player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    let onGround = false;

    // ブロックとの当たり判定
    mapBlocks.forEach(b => {
        // 足元（乗る）
        if (player.vx >= 0 && player.x + player.w > b.x && player.x < b.x + blockSize &&
            player.y + player.h > b.y && player.y + player.h < b.y + 20 && player.vy >= 0) {
            player.y = b.y - player.h;
            player.vy = 0;
            onGround = true;
        }
        // 頭上（叩く）
        if (player.x + player.w > b.x && player.x < b.x + blockSize &&
            player.y < b.y + blockSize && player.y > b.y + 20 && player.vy < 0) {
            player.vy = 2; // 跳ね返る
            if (b.type === 2 && !b.hit) {
                b.hit = true;
                coins++; // 木の実獲得
                pickups.push({x: b.x + 10, y: b.y - 30, life: 20}); // 出る演出
            }
        }
    });

    player.grounded = onGround;
    if (player.y > canvas.height) gameOver("落下しました！");

    cameraX = player.x - canvas.width/4;
    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width));

    // 敵
    enemies.forEach(e => {
        e.x += e.speed * e.dir;
        if (rectIntersect(player, e)) {
            if (player.vy > 0 && player.y < e.y) {
                e.x = -999; player.vy = -10;
            } else gameOver("敵に当たりました！");
        }
    });

    coinEl.innerText = coins;
    if (player.x > goal.x && coins >= 10) {
        gameActive = false; alert("ゴール！完全攻略！"); location.reload();
    } else if (player.x > goal.x) {
        msgEl.style.display = "block";
    }
}

function rectIntersect(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // ブロック描画
    mapBlocks.forEach(b => {
        if (b.type === 1) {
            ctx.fillStyle = "#a52a2a"; // レンガ
            ctx.fillRect(b.x, b.y, blockSize-2, blockSize-2);
            ctx.strokeStyle = "#000"; ctx.strokeRect(b.x, b.y, blockSize-2, blockSize-2);
        } else {
            ctx.fillStyle = b.hit ? "#777" : "#ffcc00"; // ハテナ
            ctx.fillRect(b.x, b.y, blockSize-2, blockSize-2);
            ctx.fillStyle = "#fff"; ctx.font = "20px Arial";
            ctx.fillText(b.hit ? "●" : "?", b.x+12, b.y+28);
        }
    });

    // 演出用アニメ
    pickups.forEach((p, i) => {
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(p.x+5, p.y, 8, 0, Math.PI*2); ctx.fill();
        p.y -= 2; p.life--;
        if(p.life < 0) pickups.splice(i, 1);
    });

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = "green"; ctx.fillRect(e.x, e.y, e.w, e.h);
    });

    // ゴール
    ctx.fillStyle = "#000"; ctx.fillRect(goal.x, goal.y, 5, 160);
    ctx.fillStyle = "red"; ctx.fillRect(goal.x-30, goal.y, 30, 20);

    // プレイヤー（キツネ）
    ctx.fillStyle = "#ff8c00";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "#000"; ctx.fillRect(player.x+20, player.y+5, 5, 5);

    ctx.restore();
    if (gameActive) { update(); requestAnimationFrame(draw); }
}

function gameOver(t) {
    gameActive = false; alert(t); location.reload();
}

draw();
</script>
</body>
</html>
