<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fox's Hardcore Forest</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4EA3CC; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #FFF; text-shadow: 3px 3px 0 #2E8B57; pointer-events: none; }
        .hud-item { font-size: 28px; margin-bottom: 5px; }
        #msg { color: #FF4500; font-size: 20px; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="hud-item">NUTS: <span id="coinCount">0</span> / 10 (Total 15)</div>
        <div id="msg">!!! LACK OF NUTS !!!</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const coinEl = document.getElementById('coinCount');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = 500;

const worldWidth = 5500;
let cameraX = 0;
let coins = 0;
let gameActive = true;
const gravity = 0.75;

const player = {
    x: 100, y: 300, w: 40, h: 30,
    vx: 0, vy: 0, acc: 0.7, friction: 0.82, maxSpeed: 7,
    jumpPower: -16, grounded: false
};

// --- ステージ生成 ---
const grounds = [
    {x: 0, w: 800}, {x: 1000, w: 500}, {x: 1700, w: 400}, 
    {x: 2300, w: 1000}, {x: 3600, w: 600}, {x: 4500, w: 1000}
];

const platforms = [
    {x: 820, y: 300, w: 150, h: 15, type: 'moving', offset: 0, speed: 0.05},
    {x: 1500, y: 250, w: 180, h: 15, type: 'static'},
    {x: 2120, y: 280, w: 150, h: 15, type: 'moving', offset: 0, speed: 0.08},
    {x: 3300, y: 320, w: 250, h: 15, type: 'static'},
    {x: 4250, y: 250, w: 200, h: 15, type: 'moving', offset: 0, speed: 0.04}
];

// 15個の木の実
const pickups = Array.from({length: 15}, (_, i) => ({
    x: 400 + (i * 320), y: 150 + (Math.random() * 180), w: 20, h: 25
}));

// 敵の種類
const enemies = [
    // 地上パトロール
    {x: 600, y: 320, w: 35, h: 25, type: 'land', speed: 3, dir: 1},
    {x: 2500, y: 320, w: 35, h: 25, type: 'land', speed: 4, dir: 1},
    {x: 4700, y: 320, w: 35, h: 25, type: 'land', speed: 5, dir: 1},
    // ジャンパー
    {x: 1100, y: 320, w: 30, h: 30, type: 'jumper', vy: 0, jumpCD: 0},
    {x: 2800, y: 320, w: 30, h: 30, type: 'jumper', vy: 0, jumpCD: 0},
    // 空飛ぶカラス
    {x: 1800, y: 100, w: 40, h: 20, type: 'bird', speed: 6},
    {x: 3800, y: 80, w: 40, h: 20, type: 'bird', speed: 8}
];

const goal = { x: 5350, y: 200, w: 10, h: 150 };

// --- ロジック ---
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (!gameActive) return;

    if (keys['ArrowRight']) player.vx += player.acc;
    else if (keys['ArrowLeft']) player.vx -= player.acc;
    else player.vx *= player.friction;
    player.vx = Math.max(-player.maxSpeed, Math.min(player.vx, player.maxSpeed));

    if ((keys['Space'] || keys['ArrowUp']) && player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    let onGround = false;
    grounds.forEach(g => {
        if (player.x + player.w > g.x && player.x < g.x + g.w && player.y + player.h >= 350 && player.y + player.h <= 375) {
            player.y = 350 - player.h; player.vy = 0; onGround = true;
        }
    });

    platforms.forEach(p => {
        let px = p.x;
        if (p.type === 'moving') {
            p.offset = Math.sin(Date.now() * p.speed) * 120;
            px += p.offset;
        }
        if (player.vy > 0 && player.x + player.w > px && player.x < px + p.w && player.y + player.h > p.y && player.y + player.h < p.y+15) {
            player.y = p.y - player.h; player.vy = 0; onGround = true;
        }
    });
    player.grounded = onGround;

    if (player.y > canvas.height) gameOver("DEAD: FALLEN");

    cameraX = player.x - canvas.width/4;
    cameraX = Math.max(0, Math.min(cameraX, worldWidth - canvas.width));

    pickups.forEach((c, i) => {
        if (rectIntersect(player, c)) { pickups.splice(i, 1); coins++; }
    });

    enemies.forEach(e => {
        if (e.type === 'land') {
            e.x += e.speed * e.dir;
            if (e.x > worldWidth || e.x < 0) e.dir *= -1;
        } else if (e.type === 'jumper') {
            e.vy += 0.5; e.y += e.vy;
            if (e.y >= 320) { e.y = 320; e.vy = -12; }
        } else if (e.type === 'bird') {
            e.x -= e.speed; if (e.x < -100) e.x = worldWidth + 500;
            e.y += Math.sin(Date.now() * 0.01) * 2;
        }

        if (rectIntersect(player, e)) {
            if (player.vy > 0 && player.y < e.y) {
                e.x = -9999; player.vy = -10;
            } else {
                gameOver("DEAD: CONTACT");
            }
        }
    });

    if (rectIntersect(player, goal)) {
        if (coins >= 10) {
            gameActive = false; alert("MISSION COMPLETE!"); location.reload();
        } else {
            msgEl.style.display = "block";
        }
    } else {
        msgEl.style.display = "none";
    }
    coinEl.innerText = coins;
}

function rectIntersect(a, b) {
    let bx = b.x + (b.offset || 0);
    return a.x < bx + b.w && a.x + a.w > bx && a.y < b.y + b.h && a.y + a.h > b.y;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // 山
    ctx.fillStyle = "#6EB56B";
    for(let i=0; i<10; i++) {
        ctx.beginPath(); ctx.moveTo(i*700, 350); ctx.lineTo(i*700+350, 100); ctx.lineTo(i*700+700, 350); ctx.fill();
    }

    // 地形
    grounds.forEach(g => {
        ctx.fillStyle = "#5D4037"; ctx.fillRect(g.x, 350, g.w, 150);
        ctx.fillStyle = "#4CAF50"; ctx.fillRect(g.x, 350, g.w, 15);
    });

    // 足場
    platforms.forEach(p => {
        ctx.fillStyle = "#E0F2F1";
        let px = p.x + (p.offset || 0);
        ctx.beginPath(); ctx.roundRect(px, p.y, p.w, p.h, 10); ctx.fill();
    });

    // 木の実
    pickups.forEach(c => {
        ctx.fillStyle = "#D84315"; ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 10, 0, Math.PI*2); ctx.fill();
    });

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.type === 'land' ? "#2E7D32" : (e.type === 'jumper' ? "#1565C0" : "#212121");
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = "white"; ctx.fillRect(e.x+5, e.y+5, 5, 5);
    });

    // ゴール
    ctx.fillStyle = "#5D4037"; ctx.fillRect(goal.x, goal.y, 8, 150);
    ctx.fillStyle = coins >= 10 ? "#C62828" : "#9E9E9E";
    ctx.fillRect(goal.x-30, goal.y, 70, 40);
    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
    ctx.fillText("EXIT", goal.x-10, goal.y+25);

    // プレイヤー（キツネ）
    ctx.fillStyle = "#EF6C00";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "black"; ctx.fillRect(player.x+player.w-10, player.y+5, 5, 5);
    ctx.fillStyle = "#FFF"; ctx.fillRect(player.x-10, player.y+10, 15, 10);

    ctx.restore();
    if (gameActive) { update(); requestAnimationFrame(draw); }
}

function gameOver(t) {
    gameActive = false; alert(t); location.reload();
}

draw();
</script>
</body>
</html>
